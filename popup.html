<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Transcript</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>YouTube 文字起こし</h1>
    </header>

    <div id="state-idle" class="state">
      <p class="hint">YouTubeの動画ページを開いて、ボタンを押してください。</p>
      <button id="btn-fetch" class="btn btn-primary">文字起こしを取得</button>
    </div>

    <div id="state-loading" class="state hidden">
      <div class="spinner"></div>
      <p>取得中...</p>
    </div>

    <div id="state-error" class="state hidden">
      <p id="error-message" class="error-text"></p>
      <button id="btn-retry" class="btn btn-secondary">再試行</button>
    </div>

    <div id="state-result" class="state hidden">
      <div class="result-header">
        <div class="video-info">
          <p id="video-title" class="video-title"></p>
          <div class="lang-row">
            <label for="lang-select">言語:</label>
            <select id="lang-select"></select>
          </div>
        </div>
        <div class="actions">
          <button id="btn-copy-text" class="btn btn-primary">テキストをコピー</button>
          <button id="btn-copy-timestamped" class="btn btn-secondary">タイムスタンプ付きコピー</button>
          <button id="btn-reset" class="btn btn-ghost">リセット</button>
        </div>
      </div>

      <div id="transcript-container" class="transcript-container"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
